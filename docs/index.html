<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图解 Claude Code 完全指南</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="哆啦A梦风格漫画图解 Claude Code 源码架构 - 零基础友好的完全学习指南">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #4A90D9;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #4A90D9;
      --sidebar-name-font-weight: bold;
      --cover-background-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .markdown-section h1 { border-bottom: 2px solid #4A90D9; padding-bottom: 8px; }
    .markdown-section h2 { color: #4A90D9; }
    .markdown-section blockquote { border-left: 4px solid #4A90D9; background: #f0f7ff; padding: 12px 20px; }
    .markdown-section table { width: 100%; }
    .markdown-section img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .comic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .comic-grid img { width: 100%; border-radius: 8px; }
    .tip-box { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; margin: 16px 0; border-radius: 0 8px 8px 0; }
    .warn-box { background: #fff3e0; border-left: 4px solid #ff9800; padding: 12px 16px; margin: 16px 0; border-radius: 0 8px 8px 0; }
    .cover-main { max-width: 700px; }
    @media print {
      .docsify-pagination-container, .sidebar, .sidebar-toggle { display: none !important; }
      .content { margin-left: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>
  <script>
    window.$docsify = {
      name: '图解 Claude Code 完全指南',
      repo: 'https://github.com/bcefghj/claude-code-complete-guide',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      search: {
        placeholder: '搜索...',
        noData: '没有找到结果',
        paths: 'auto',
        depth: 3
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      plugins: [
        function(hook) {
          hook.beforeEach(function(content) {
            return content;
          });
          hook.doneEach(function() {
            if (typeof mermaid !== 'undefined') {
              mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            }
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad: false, theme: 'default'});</script>
</body>
</html>
