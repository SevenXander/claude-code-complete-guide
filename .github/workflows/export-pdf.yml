name: Export PDF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  export-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -fv

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install -g docsify-cli

      - name: Start docsify and export PDF
        run: |
          docsify serve docs --port 3000 &
          sleep 5
          node scripts/export-pdf.js

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Delete old releases
        run: |
          gh release list --limit 100 --json tagName -q '.[].tagName' | while read tag; do
            gh release delete "$tag" --yes --cleanup-tag || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pdf-${{ steps.date.outputs.date }}
          name: "图解 Claude Code 完全指南 PDF"
          body: |
            自动导出的 PDF 版本，包含全部 12 篇 114 节课程内容。

            直接下载：点击下方 claude-code-complete-guide.pdf
          files: claude-code-complete-guide.pdf
          make_latest: true
